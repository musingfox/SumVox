<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SumVox Orb — Canvas 2D prototype</title>
<style>
  :root { color-scheme: dark; }
  html, body { margin: 0; background: #0b0f14; color: #cdd6e0;
    font: 14px/1.5 ui-monospace, "SF Mono", Menlo, monospace; }
  .stage { display: flex; flex-direction: column; align-items: center; gap: 16px; padding: 32px; }
  canvas { width: 320px; height: 320px; image-rendering: auto;
    background: radial-gradient(circle at 50% 50%, #131a22, #070a0e);
    border-radius: 12px; box-shadow: 0 8px 40px rgba(0,0,0,.5); }
  .ctl { display: grid; grid-template-columns: auto 1fr auto; gap: 8px 12px; width: 320px; }
  .ctl label { text-align: right; color: #7d8a9a; }
  .ctl input[type=range] { width: 100%; }
  .ctl .val { color: #34d399; text-align: left; min-width: 3ch; }
  .row { display: flex; gap: 8px; }
  button { background: #1a222d; color: #cdd6e0; border: 1px solid #2a3644;
    border-radius: 6px; padding: 4px 10px; cursor: pointer; font: inherit; }
  button.on { background: #143a36; border-color: #34d399; color: #34d399; }
  .fps { color: #7d8a9a; font-size: 12px; }
  .note { color: #566574; font-size: 12px; max-width: 320px; text-align: center; }
</style>
</head>
<body>
<div class="stage">
  <canvas id="orb" width="160" height="160"></canvas>
  <div class="ctl">
    <label for="lvl">level</label>
    <input id="lvl" type="range" min="0" max="1" step="0.01" value="0">
    <span class="val" id="lvlVal">0.00</span>
    <label>mode</label>
    <div class="row">
      <button id="idleBtn">idle</button>
      <button id="speakBtn">speaking</button>
    </div>
    <span></span>
    <label>fps</label>
    <span class="fps" id="fps" colspan="2">—</span>
    <span></span>
  </div>
  <p class="note">vanilla Canvas 2D · zero build · 直譯 radial-blob 演算法<br>拖 level 滑桿模擬音量；speaking 切 60fps 全亮</p>
</div>

<script>
(() => {
  const cv = document.getElementById('orb');
  const ctx = cv.getContext('2d');
  const SIZE = 160, CX = 80, CY = 80, BASE_R = 54, SEG = 48;

  // palette — emerald → cyan (sRGB). ctr = emerald mixed toward white (highlight core)
  const FR=0.204, FG=0.827, FB=0.6;   // #34d399
  const TR=0.133, TG=0.827, TB=0.933;  // #22d3ee
  const CTR = [FR*0.6+0.4, FG*0.6+0.4, FB*0.6+0.4];
  const MID = [TR, TG, TB];
  const RIM = [TR*0.45, TG*0.45, TB*0.45];

  let lvl = 0, lvlTarget = 0, active = false;
  let breathe = 0, idle = 0, wobA = 0, wobB = 0;
  let last = 0, tick = 0, frames = 0, fpsT = 0, fps = 0;

  // sample blob radius at angle θ — stacked sines (idle drift + level-driven wobble)
  function radius(theta, lvl) {
    const b = 1 + 0.04 * Math.sin(breathe);
    const swell = 1 + 0.15 * lvl;
    const idleW = 0.05 * Math.sin(2*theta + idle) + 0.03 * Math.sin(3*theta + idle*0.7);
    const driven = 0.12 * lvl * Math.sin(3*theta + wobA) + 0.06 * Math.sin(5*theta - wobB);
    return BASE_R * b * swell * (1 + idleW + driven);
  }

  // Catmull-Rom → cubic bezier closed path through 48 rim points
  function blobPath(lvl) {
    const pts = [];
    for (let i = 0; i < SEG; i++) {
      const th = i / SEG * Math.PI * 2;
      const r = radius(th, lvl);
      pts.push([CX + r*Math.cos(th), CY + r*Math.sin(th)]);
    }
    ctx.beginPath();
    for (let i = 0; i < SEG; i++) {
      const p0 = pts[(i-1+SEG)%SEG], p1 = pts[i], p2 = pts[(i+1)%SEG], p3 = pts[(i+2)%SEG];
      const c1 = [p1[0] + (p2[0]-p0[0])/6, p1[1] + (p2[1]-p0[1])/6];
      const c2 = [p2[0] - (p3[0]-p1[0])/6, p2[1] - (p3[1]-p1[1])/6];
      if (i === 0) ctx.moveTo(p1[0], p1[1]);
      ctx.bezierCurveTo(c1[0], c1[1], c2[0], c2[1], p2[0], p2[1]);
    }
    ctx.closePath();
  }

  function paint() {
    ctx.clearRect(0, 0, SIZE, SIZE);
    const lvlP = Math.pow(lvl, 1.4);
    blobPath(lvlP);

    // fill: clip to blob, radial gradient from upper-left highlight
    ctx.save();
    ctx.clip();
    const g = ctx.createRadialGradient(CX-9, CY+9, 0, CX, CY, BASE_R*1.15);
    g.addColorStop(0, `rgb(${CTR.map(c=>Math.round(c*255)).join(',')})`);
    g.addColorStop(0.55, `rgb(${MID.map(c=>Math.round(c*255)).join(',')})`);
    g.addColorStop(1, `rgb(${RIM.map(c=>Math.round(c*255)).join(',')})`);
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, SIZE, SIZE);
    ctx.restore();

    // hairline rim
    blobPath(lvlP);
    ctx.strokeStyle = 'rgba(255,255,255,0.25)';
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  function loop(t) {
    const now = t / 1000;
    const dt = last ? Math.min(now - last, 0.1) : 1/60;
    last = now;
    // phases advance every tick (real-time motion even when we skip redraw)
    lvl += (lvlTarget - lvl) * (1 - Math.exp(-12*dt));
    breathe += 1.1 * dt;
    idle += 0.7 * dt;
    wobA += 2.2 * dt;
    wobB += 1.4 * dt;
    // adaptive fps: idle 20fps (stride 3 @60), active 60fps (stride 1)
    tick++;
    const stride = active ? 1 : 3;
    if (tick % stride === 0) paint();
    // fps meter
    frames++;
    if (now - fpsT >= 1) { fps = frames; frames = 0; fpsT = now; fpsEl.textContent = fps + (active ? ' (60)' : ' (~20)'); }
    requestAnimationFrame(loop);
  }

  // controls
  const lvlEl = document.getElementById('lvl'), lvlVal = document.getElementById('lvlVal');
  const fpsEl = document.getElementById('fps');
  const idleBtn = document.getElementById('idleBtn'), speakBtn = document.getElementById('speakBtn');
  lvlEl.oninput = () => { lvlTarget = parseFloat(lvlEl.value); lvlVal.textContent = lvlEl.value; };
  function setMode(on) {
    active = on;
    speakBtn.classList.toggle('on', on); idleBtn.classList.toggle('on', !on);
    cv.style.opacity = on ? 1.0 : 0.55;  // active=full bright, idle=dim
  }
  idleBtn.onclick = () => setMode(false);
  speakBtn.onclick = () => setMode(true);
  setMode(false);

  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
