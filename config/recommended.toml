# SumVox Configuration
# Location: ~/.config/sumvox/config.toml
# Documentation: https://github.com/musingfox/sumvox

version = "1.2.2"

# ============================================================================
# LLM Provider Configuration (fallback chain - try in order)
# ============================================================================

[llm]
# LLM Parameters (shared across all providers)
[llm.parameters]
max_tokens = 10000
temperature = 0.3
disable_thinking = false  # Set true to reduce token usage

# Provider list: tried in order until one succeeds
# Uncomment and configure the providers you want to use
# Edit api_key = "${PROVIDER_API_KEY}" with your actual API key

# Google Gemini (Recommended: fast, cheap, reliable)
[[llm.providers]]
name = "google"
model = "gemini-3.1-flash-lite"
api_key = "${PROVIDER_API_KEY}"  # Get from: https://ai.google.dev
# base_url = "https://generativelanguage.googleapis.com/v1beta"  # Optional: custom API endpoint
timeout = 10  # seconds

# Anthropic Claude (High quality, best reasoning)
[[llm.providers]]
name = "anthropic"
model = "claude-haiku-4-5-20251001"
api_key = "${PROVIDER_API_KEY}"  # Get from: https://console.anthropic.com
# base_url = "https://api.anthropic.com/v1"  # Optional: custom API endpoint (e.g., proxy)
timeout = 10

# OpenAI GPT (Fast and capable)
[[llm.providers]]
name = "openai"
model = "gpt-5-nano"
api_key = "${PROVIDER_API_KEY}"  # Get from: https://platform.openai.com
# base_url = "https://api.openai.com/v1"  # Optional: for Azure OpenAI or compatible APIs
timeout = 10

# xAI Grok (OpenAI-compatible API; very cheap)
# Get API key: https://console.x.ai
# Uncomment to enable:
# [[llm.providers]]
# name = "xai"
# model = "grok-build-0.1"  # or grok-4-1-fast-non-reasoning, grok-4-1-fast-reasoning
# api_key = "${XAI_API_KEY}"
# # base_url = "https://api.x.ai/v1"  # default; override only for proxies
# timeout = 10

# Ollama (Local, free, slower - good fallback)
[[llm.providers]]
name = "ollama"
model = "llama3.2"
# api_key not required - Ollama runs locally without API key
# base_url = "http://localhost:11434"  # Optional: custom endpoint
timeout = 60  # Local inference needs more time
# disable_thinking = true  # 可在此覆寫全域設定 (overrides llm.parameters.disable_thinking)

# ============================================================================
# TTS Provider Configuration (fallback chain - try in order)
# ============================================================================

[tts]
# macOS Built-in TTS (Free, fast, offline)
[[tts.providers]]
name = "macos"
# api_key not required - macOS TTS is built-in, no API key needed
# voice = "Daniel"  # Optional: specify voice (run 'say -v ?' to list available voices)
rate = 200      # Speech rate (90-300, default: 200)
# volume = 100  # ⚠️ NOT SUPPORTED - macOS 'say' command does not support volume control
                # Use system volume settings instead

# Google TTS (High quality, requires API key)
# Uncomment to enable:
# [[tts.providers]]
# name = "google"
# model = "gemini-2.5-flash-preview-tts"  # Required for Google TTS
# voice = "Aoede"     # Options: Aoede, Charon, Fenrir, Kore, Puck, Orus
# api_key = "${GEMINI_API_KEY}"
# volume = 50   # ✅ SUPPORTED - Volume control via rodio (0-100, default: 100)
#               # Gemini TTS output is loud by default, 40-60 is recommended

# xAI TTS (Natural speech, 5 voices, requires API key)
# Pricing: $4.20 per 1M characters (Beta)
# Voices: eve (default), ara, rex, sal, leo
# Get API key: https://console.x.ai
# Uncomment to enable:
# [[tts.providers]]
# name = "xai"
# voice = "eve"           # Options: eve, ara, rex, sal, leo
# language_code = "auto"  # Language: "auto", "en", "zh", "ja", etc.
# api_key = "${XAI_API_KEY}"
# volume = 100  # ✅ SUPPORTED - Volume control via rodio (0-100, default: 100)

# ElevenLabs TTS (Premium voices, very natural, requires API key)
# Pricing:
#   Flash v2.5 / Turbo v2.5: $0.06 per 1K characters (~75ms latency)
#   Multilingual v2 / v3:    $0.12 per 1K characters (~300ms latency, higher quality)
# Get API key: https://elevenlabs.io/app/settings/api-keys
# Browse voices:  https://elevenlabs.io/app/voice-library
# Uncomment to enable:
# [[tts.providers]]
# name = "elevenlabs"
# model = "eleven_flash_v2_5"  # Options: eleven_flash_v2_5, eleven_turbo_v2_5, eleven_multilingual_v2, eleven_multilingual_v3
# voice = "21m00Tcm4TlvDq8ikWAM"  # Voice ID (default: Rachel). Other stock voices:
#                                  #   JBFqnCBsd6RMkjVDRZzb (George), TX3LPaxmHKxFdv7VOQHJ (Liam),
#                                  #   pNInz6obpgDQGcFmaJgB (Adam), EXAVITQu4vr4xnSDxMaL (Bella)
# api_key = "${ELEVENLABS_API_KEY}"
# volume = 100  # ✅ SUPPORTED - Volume control via afplay (0-100, default: 100)

# OpenAI TTS (gpt-4o-mini-tts, steerable style via instructions, requires API key)
# Pricing: ~$0.015 per minute of audio (gpt-4o-mini-tts)
# Voices: alloy, ash, ballad, coral, echo, fable, nova, onyx, sage, shimmer
# Get API key: https://platform.openai.com
# Uncomment to enable:
# [[tts.providers]]
# name = "openai"
# model = "gpt-4o-mini-tts"
# voice = "nova"  # Options: alloy, ash, ballad, coral, echo, fable, nova, onyx, sage, shimmer
# speed = 1.2     # Playback speed (0.25-4.0, default: 1.0)
# volume = 100    # Playback volume (0-100)
# Output format is fixed to MP3 (provider constant, not configurable)
# style_prompt = "你是工程師的語音通知助理。用台灣口音的中文,語速明顯偏快、節奏俐落,像忙碌同事快速回報進度,乾脆有精神,不拖尾音。"
# api_key = "${OPENAI_API_KEY}"

# Google Cloud TTS (Professional-grade, requires service account)
# Pricing:
#   Standard voices: $4 per 1M characters (first 4M/month free)
#   WaveNet voices: $16 per 1M characters (first 1M/month free)
# Setup: https://cloud.google.com/text-to-speech/docs/before-you-begin
# Uncomment to enable:
# [[tts.providers]]
# name = "cloud_tts"
# service_account_key = "~/.config/gcp/service-account.json"  # Path to service account key file
# language_code = "cmn-TW"  # Language code (en-US, cmn-TW, ja-JP, etc.)
#                           # Note: Traditional Chinese uses "cmn-TW" (Mandarin-Taiwan), NOT "zh-TW"
# voice = "cmn-TW-Standard-A"  # Voice name (Standard-A/B/C, Wavenet-A/B/C, etc.)
# volume = 100  # ✅ SUPPORTED - Volume control via rodio (0-100, default: 100)

# Gemini-TTS (expressive voices via the same Cloud TTS endpoint)
# Set `model` to switch cloud_tts into Gemini-TTS mode: bare voice names
# (Kore, Charon, Puck, ...) plus an optional `style_prompt` for tone control.
# Pricing:
#   Token-based, NOT per-character: $10 per 1M audio output tokens
#   (25 tokens/sec of audio). No free tier. Coarsely ~4x the cost of Standard.
# Setup: https://cloud.google.com/text-to-speech/docs/gemini-tts
# Uncomment to enable:
# [[tts.providers]]
# name = "gemini_tts"  # alias for cloud_tts; `model` triggers Gemini-TTS mode
# service_account_key = "~/.config/gcp/service-account.json"
# model = "gemini-2.5-flash-tts"
# voice = "Kore"  # Bare Gemini voice name (Kore, Charon, Puck, Aoede, ...)
# language_code = "en-US"
# style_prompt = "Say the following in a calm, encouraging tone."  # Optional
# volume = 100  # ✅ SUPPORTED - Volume control via afplay (0-100, default: 100)

# ============================================================================
# Summarization Settings (used by Stop hook and sum command)
# ============================================================================

[summarization]
# Content source for Stop hook context.
# "transcript" (default) — parse last N turns from JSONL transcript file.
# "last_message" — use Claude Code's last_assistant_message hook field directly
#   (skips transcript I/O; falls back to transcript if field missing).
# content_source = "transcript"

# Number of conversation turns to read (1 = last turn only)
# (only used when content_source = "transcript")
turns = 1

# System message for LLM (customize for your language and style)
system_message = "You are a voice notification assistant. Generate concise summaries suitable for voice playback."

# Prompt template ({context} is required)
prompt_template = "Based on the following context, generate a concise summary.\n\nContext:\n{context}\n\nSummary:"

# Fallback message when LLM fails (customize for your language)
fallback_message = "Task completed"

# ============================================================================
# Hook-specific Configuration
# ============================================================================

[hooks.claude_code]
# Notification types to speak (empty = disabled, ["*"] = all)
# Available: permission_prompt, idle_prompt, elicitation_dialog, auth_success
notification_filter = [
    "permission_prompt",
    "idle_prompt",
    "elicitation_dialog"
]

# TTS provider for Notification hook
# "auto" = use TTS fallback chain
# "macos" = force macOS TTS (fast, offline)
# "google" = force Google TTS (high quality)
notification_tts_provider = "macos"

# TTS provider for Stop hook
# "auto" = use TTS fallback chain (recommended)
stop_tts_provider = "auto"

# Volume control for different hook types (0-100)
# ⚠️ IMPORTANT: Volume control support depends on TTS provider
#    ✅ Google TTS: Supports volume control
#    ❌ macOS TTS: Does NOT support volume control (uses system volume)
notification_volume = 80   # Notification volume (only works with Google TTS)
stop_volume = 100          # Summary volume (only works with Google TTS)
